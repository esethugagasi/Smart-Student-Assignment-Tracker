name: CI/CD Pipeline

on:
  push:
    branches:
      - "*"

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest --cov=.

  build-artifact:
    needs: test

    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Artifact
        run: |
          mkdir release
          cp -r api services repositories src main.py README.md release/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-student-assignment-tracker
          path: release/